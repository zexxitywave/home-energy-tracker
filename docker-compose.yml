  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=5d
      - --web.enable-lifecycle
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped


  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped


  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: home_energy_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ─────────────────────────────────────────
  #           Application Services
  # ─────────────────────────────────────────

  user-service:
    container_name: user-service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres

      - kafka
#      - keycloak
    restart: unless-stopped

  device-service:
    container_name: device-service
    build:
      context: ./device-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres

      - kafka
    restart: unless-stopped

  ingestion-service:
    container_name: ingestion-service
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:

      - kafka
      - influxdb
    restart: unless-stopped

  usage-service:
    container_name: usage-service
    build:
      context: ./usage-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:

      - kafka
      - influxdb
    restart: unless-stopped

  alert-service:
    container_name: alert-service
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - postgres

      - kafka

    restart: unless-stopped

  insight-service:
    container_name: insight-service
    build:
      context: ./insight-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:

      - kafka
      - influxdb
    restart: unless-stopped

  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - user-service
      - device-service
      - ingestion-service
      - usage-service
      - alert-service
      - insight-service
#      - keycloak
      - prometheus
      - grafana
    restart: unless-stopped

volumes:
  postgres-data:

  kafka-data:
  grafana-data: