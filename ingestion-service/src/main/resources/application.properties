spring.application.name=ingestion-service
server.port = 8082
server.forward-headers-strategy=framework
# Actuator & Prometheus (scraped by Prometheus in docker-compose)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

#Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=energy-usage
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# Continuous simulation configuration
simulation.endpoint=http://ingestion-service:8082/api/v1/ingestion
simulation.requests-per-interval=1
simulation.interval-ms=300000
simulation.parallel-threads=1
