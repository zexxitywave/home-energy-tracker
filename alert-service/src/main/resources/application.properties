spring.application.name=alert-service
server.port=8084

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
server.forward-headers-strategy=framework
# Kafka
spring.kafka.bootstrap-servers=alert-service:9094
spring.kafka.consumer.group-id=alert-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=alertingEvent:com.leetjourney.kafka.event.AlertingEvent

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/home_energy_tracker
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

