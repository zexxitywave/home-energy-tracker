spring.application.name=usage-service
server.port=8083
server.forward-headers-strategy=framework
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

# Kafka
spring.kafka.bootstrap-servers=usage-service:9094
spring.kafka.consumer.group-id=usage-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=energyUsageEvent:com.leetjourney.kafka.event.EnergyUsageEvent

spring.kafka.template.default-topic=energy-alerts
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Influx
influx.url=http://usage-service:8072
influx.token=my-token
influx.org=leetjourney
influx.bucket=usage-bucket

# other services
device.service.url=http://usage-service:8081/api/v1/device
user.service.url=http://usage-service:8080/api/v1/user

electricity.rate.per.kwh=8.5
monthly.billing.days=30