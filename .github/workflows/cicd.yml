name: Home Energy Tracker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven Project
        run: mvn clean install -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ublaandaa
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Gateway
        run: |
          docker build -t ublaandaa/api-gateway:latest ./api-gateway
          docker push ublaandaa/api-gateway:latest

      - name: Build and Push User Service
        run: |
          docker build -t ublaandaa/user-service:latest ./user-service
          docker push ublaandaa/user-service:latest

      - name: Build and Push Device Service
        run: |
          docker build -t ublaandaa/device-service:latest ./device-service
          docker push ublaandaa/device-service:latest

      - name: Build and Push Ingestion Service
        run: |
          docker build -t ublaandaa/ingestion-service:latest ./ingestion-service
          docker push ublaandaa/ingestion-service:latest

      - name: Build and Push Usage Service
        run: |
          docker build -t ublaandaa/usage-service:latest ./usage-service
          docker push ublaandaa/usage-service:latest

      - name: Build and Push Alert Service
        run: |
          docker build -t ublaandaa/alert-service:latest ./alert-service
          docker push ublaandaa/alert-service:latest

      - name: Build and Push Insight Service
        run: |
          docker build -t ublaandaa/insight-service:latest ./insight-service
          docker push ublaandaa/insight-service:latest