<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Upload</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            background: white;
        }

        .header-section {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 30px;
            color: white;
            text-align: center;
        }

        .header-section h2 {
            margin: 0;
            font-weight: 700;
        }

        .header-section p {
            margin-top: 8px;
            opacity: 0.9;
        }

        .form-section {
            padding: 35px;
        }

        .form-label {
            font-weight: 600;
            color: #1e293b;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #d1d5db;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.2);
        }

        .submit-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        #message {
            font-weight: 600;
            font-size: 15px;
        }

        .upload-box {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 18px;
            background: #f8fafc;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card main-card">

                <div class="header-section">
                    <h2>Submit Complaint</h2>
                    <p>Home Energy Tracker Support Portal</p>
                </div>

                <div class="form-section">

                    <form id="complaintForm">

                        <div class="mb-3">
                            <label class="form-label">User ID</label>
                            <input type="number" class="form-control" id="userId" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Complaint Title</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="4"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="category">
                                    <option>BILLING</option>
                                    <option>DEVICE_SYNC</option>
                                    <option>USAGE_DATA</option>
                                    <option>PAYMENT</option>
                                    <option>NOTIFICATION</option>
                                    <option>GENERAL</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Priority</label>
                                <select class="form-select" id="priority">
                                    <option>LOW</option>
                                    <option>MEDIUM</option>
                                    <option>HIGH</option>
                                    <option>CRITICAL</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Upload Images</label>
                            <div class="upload-box">
                                <input type="file" class="form-control" id="images" multiple accept="image/*">
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 submit-btn">
                            Submit Complaint
                        </button>

                    </form>

                    <div id="message" class="mt-4 text-center"></div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    document.getElementById("complaintForm").addEventListener("submit", async function(event) {

        event.preventDefault();

        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");

        submitBtn.disabled = true;
        message.innerHTML = "Submitting...";

        const complaint = {
            userId: parseInt(document.getElementById("userId").value),
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            category: document.getElementById("category").value,
            priority: document.getElementById("priority").value
        };

        const formData = new FormData();
        formData.append("complaint", JSON.stringify(complaint));

        const files = document.getElementById("images").files;

        console.log("Selected files:", files.length);

        for (let i = 0; i < files.length; i++) {
            formData.append("files", files[i]);
            console.log("Appending:", files[i].name);
        }

        try {
            const response = await fetch("/api/complaints", {
                method: "POST",
                body: formData
            });

            const result = await response.text();
            console.log(result);

            if (response.ok) {
                message.innerHTML =
                    "<span class='text-success'>Complaint Submitted Successfully</span>";
                document.getElementById("complaintForm").reset();
            } else {
                message.innerHTML =
                    "<span class='text-danger'>Error: " + result + "</span>";
            }

        } catch (error) {
            console.error(error);
            message.innerHTML =
                "<span class='text-danger'>Server Error</span>";
        }

        submitBtn.disabled = false;
    });
</script>

</body>
</html>
